<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS CORE TV PRO</title>

<style>
* { box-sizing: border-box; }

body, html {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    height: 100%;
}

/* APP */
.app {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #050505;
    border-right: 2px solid #00f2ff;
    padding: 15px;
    overflow-y: auto;
}

.sidebar h2 {
    color: #00f2ff;
    font-size: 13px;
}

.canal {
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
}

.canal:hover {
    background: #00f2ff;
    color: #000;
}

/* MAIN */
.main {
    flex: 1;
    position: relative;
}

/* VIDEO */
iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(100% - 100px);
    border: none;
}

/* 📺 MODO TV MÁS COMPATIBLE */
.tv-mode iframe {
    top: -150px;
    height: calc(100% + 300px);
}

/* FRANJA ARRIBA */
#franja-oculta {
    position: absolute;
    top: 10px;
    width: 100%;
    height: 170px;
    background: black;
    z-index: 8;
    pointer-events: none;
}

/* FRANJA ABAJO */
#franja-player {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100px;
    background: black;
    z-index: 7;
}

/* BLOQUEADOR */
#bloqueador {
    position: absolute;
    top: 40px;
    width: 100%;
    height: calc(100% - 40px);
    z-index: 9;
}

/* TOPBAR */
.topbar {
    position: absolute;
    top: 0;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    z-index: 10;
}

.titulo {
    color: #00f2ff;
    font-size: 12px;
}

.controles {
    display: flex;
    gap: 5px;
}

select, button {
    background: black;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    cursor: pointer;
}

/* BOTÓN FALLBACK */
#abrirDirecto {
    display: none;
    position: absolute;
    bottom: 120px;
    left: 20px;
    z-index: 20;
}

/* MOBILE */
@media(max-width:768px){
    .sidebar {
        position: absolute;
        left: -250px;
        height: 100%;
        z-index: 20;
    }
    .sidebar.active {
        left: 0;
    }
}
</style>

</head>

<body>

<div class="app" id="app">

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="topbar">
    <div class="titulo" id="titulo">ZEUS TV</div>
    <div class="controles">
        <select id="calidad">
            <option value="auto">AUTO</option>
            <option value="sd">SD</option>
            <option value="hd">HD</option>
        </select>
        <button onclick="permitirClicks()">INTERACTUAR</button>
        <button onclick="volver()">VOLVER</button>
    </div>
</div>

<div id="bloqueador"></div>
<div id="franja-oculta"></div>

<iframe id="player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; fullscreen">
</iframe>

<div id="franja-player"></div>

<button id="abrirDirecto">Abrir canal directo</button>

</div>
</div>

<script>

/* DETECCIÓN TV MEJORADA */
function detectarTV() {
    const ua = navigator.userAgent.toLowerCase();

    if (
        ua.includes("smarttv") ||
        ua.includes("tizen") ||
        ua.includes("webos") ||
        ua.includes("netcast") ||
        ua.includes("viera") ||
        ua.includes("appletv") ||
        ua.includes("hbbtv") ||
        window.innerWidth > 1300
    ) {
        document.getElementById("app").classList.add("tv-mode");
    }
}
detectarTV();

/* BLOQUEO POPUPS */
window.open = () => null;

/* DATA */
const data = {
"Deportes":[
{
nombre:"Win Sports+",
urls:{
auto:"https://futbol-libre.su/win-sports-premium/",
sd:"https://futbol-libre.su/win-sports-premium/",
hd:"https://futbol-libre.su/win-sports-premium/"
}
},
{
nombre:"ESPN",
urls:{
auto:"https://futbol-libre.su/espn-1/",
sd:"https://futbol-libre.su/espn-1/",
hd:"https://futbol-libre.su/espn-1/"
}
}
],
"Internacional":[
{
nombre:"Fox Sports",
urls:{
auto:"https://futbol-libre.su/fox-sports/",
sd:"https://futbol-libre.su/fox-sports/",
hd:"https://futbol-libre.su/fox-sports/"
}
}
]
};

const sidebar = document.getElementById("sidebar");
const player = document.getElementById("player");
const titulo = document.getElementById("titulo");
const calidad = document.getElementById("calidad");
const bloqueador = document.getElementById("bloqueador");
const btnDirecto = document.getElementById("abrirDirecto");

let canalActual = null;

/* MENU */
for (let cat in data) {
    let cont = document.createElement("div");
    let h = document.createElement("h2");
    h.innerText = cat;
    cont.appendChild(h);

    data[cat].forEach(c => {
        let btn = document.createElement("div");
        btn.className = "canal";
        btn.innerText = c.nombre;

        btn.onclick = () => {
            canalActual = c;
            cargar();
        };

        cont.appendChild(btn);
    });

    sidebar.appendChild(cont);
}

/* CARGAR */
function cargar(){
    if(!canalActual) return;

    let url = canalActual.urls[calidad.value];
    player.src = url;

    titulo.innerText = canalActual.nombre;

    bloqueador.style.pointerEvents = "auto";

    /* fallback */
    btnDirecto.style.display = "block";
    btnDirecto.onclick = () => {
        window.location.href = url;
    };
}

/* CALIDAD */
calidad.addEventListener("change", cargar);

/* INTERACTUAR */
function permitirClicks(){
    bloqueador.style.pointerEvents = "none";
}

/* VOLVER */
function volver(){
    player.src = "";
    titulo.innerText = "ZEUS TV";
    canalActual = null;
    btnDirecto.style.display = "none";
}

</script>

</body>
</html>
