<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- LA FRANJA NEGRA DE MARCA --- */
        .franja-marca {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 35px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10005;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.15);
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-size: 13px;
            text-shadow: 0 0 8px #00f2ff;
        }

        /* CAPA DE INICIO */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10010;
        }

        .btn-zeus {
            padding: 20px 50px;
            font-size: 20px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: none;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 0 20px #00f2ff;
            cursor: pointer;
        }

        /* BOTÓN VOLVER */
        .panel-controles {
            position: fixed;
            top: 45px; 
            right: 15px;
            z-index: 10006;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.9);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* CONTENEDOR Y REPRODUCTOR */
        .contenedor-cine {
            position: relative;
            width: 100vw;
            height: 100vh;
            margin-top: 35px;
        }

        iframe {
            position: absolute;
            top: -550px; 
            left: 0;
            width: 100%;
            height: calc(100vh + 900px); 
            transform: scale(1.6); 
            transform-origin: top center;
            border: none;
        }

        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Franja Superior ZEUS -->
    <div class="franja-marca" id="barra-titulo" style="display: none;">
        <div class="texto-marca">ZEUS CORE TV</div>
    </div>

    <div class="panel-controles" id="controles" style="display: none;">
        <button class="btn-volver" onclick="window.location.reload()">volver</button>
    </div>

    <div class="overlay-inicio" id="bloqueo">
        <button class="btn-zeus" onclick="iniciar()">CONECTAR ZEUS CORE</button>
    </div>

    <div class="contenedor-cine">
        <div id="escudo-zeus"></div>
        <iframe 
            id="video-frame"
            src="https://futbol-libre.su/win-sports-premium/" 
            allow="autoplay; encrypted-media; fullscreen"
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"
            scrolling="no">
        </iframe>
    </div>

    <script>
        const escudo = document.getElementById('escudo-zeus');

        function iniciar() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            
            document.getElementById('bloqueo').style.display = 'none';
            document.getElementById('controles').style.display = 'block';
            document.getElementById('barra-titulo').style.display = 'flex';
            
            escudo.style.display = 'block';
            escudo.style.pointerEvents = 'none';

            const monitor = setInterval(() => {
                if (document.activeElement === document.getElementById('video-frame')) {
                    escudo.style.pointerEvents = 'auto';
                    clearInterval(monitor);
                }
            }, 100);
        }
    </script>
</body>
</html>
