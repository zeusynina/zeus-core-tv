<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS TV</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* 🔥 MENÚ PRINCIPAL */
#menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
}

/* BOTONES GRANDES */
.canal {
    width: 300px;
    padding: 20px;
    text-align: center;
    border: 2px solid #00f2ff;
    font-size: 18px;
    cursor: pointer;
}

.canal:hover {
    background: #00f2ff;
    color: black;
}

/* 🎬 REPRODUCTOR (OCULTO AL INICIO) */
#playerContainer {
    display: none;
    position: relative;
    width: 100%;
    height: 100vh;
}

iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
}

/* 🔙 BOTÓN VOLVER */
#volver {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    padding: 10px;
}
</style>

</head>

<body>

<!-- 🔥 MENÚ -->

<div id="menu">
    <h1>SELECCIONAR CANAL</h1>

```
<div class="canal" onclick="abrir('https://futbol-libre.su/win-sports-premium/')">
    Win Sports+
</div>

<div class="canal" onclick="abrir('https://futbol-libre.su/espn-1/')">
    ESPN
</div>

<div class="canal" onclick="abrir('https://futbol-libre.su/fox-sports/')">
    Fox Sports
</div>
```

</div>

<!-- 🎬 PLAYER -->

<div id="playerContainer">
    <button id="volver" onclick="volver()">VOLVER</button>
    <iframe id="player"></iframe>
</div>

<script>

function abrir(url){
    document.getElementById("menu").style.display = "none";
    document.getElementById("playerContainer").style.display = "block";
    document.getElementById("player").src = url;
}

function volver(){
    document.getElementById("player").src = "";
    document.getElementById("playerContainer").style.display = "none";
    document.getElementById("menu").style.display = "flex";
}

</script>

</body>
</html>
