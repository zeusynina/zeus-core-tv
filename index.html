<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* FRANJA SUPERIOR */
        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 35px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10005;
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 13px;
            text-shadow: 0 0 8px #00f2ff;
        }

        /* MENU DE SELECCIÓN */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
            gap: 20px;
        }

        .btn-zeus {
            padding: 15px 40px;
            width: 300px;
            font-size: 16px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* CONTENEDOR MAESTRO DE VIDEO */
        .contenedor-cine {
            position: absolute;
            top: 35px;
            left: 0;
            width: 650vw;
            height: calc(100vh - 35px);
            display: none;
            background: #000;
            /* Centra el reproductor en el medio de cualquier pantalla */
            display: none; 
            align-items: center;
            justify-content: center;
        }

        /* AJUSTE DINÁMICO (Responsive) */
        .wrapper-video {
            position: relative;
            width: 100%;
            height: 0;
            /* Proporción 16:9 estándar de TV */
            padding-bottom: 56.25%; 
            overflow: hidden;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* EFECTO DE ZOOM SOLO PARA PC (Para quitar bordes del sitio de stream) */
        @media (min-width: 1200px) {
            .wrapper-video {
                padding-bottom: 0;
                height: 150%; /* Aumentamos altura para el recorte */
                top: -25%;   /* Centramos el recorte */
            }
            iframe {
                transform: scale(1.1); /* Zoom ligero */
            }
        }

        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: transparent;
        }

        .panel-controles {
            position: fixed;
            top: 45px; right: 15px;
            z-index: 10006;
            display: none;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.9);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 11px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-canal-display">ZEUS CORE TV</div>
    </div>

    <div class="overlay-inicio" id="menu-canales">
        <h2 style="color: #00f2ff; letter-spacing: 5px; margin-bottom: 20px;">ZEUS CORE SYSTEM</h2>
        <div id="lista-botones" style="display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button class="btn-volver" onclick="window.location.reload()">🔄 VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine-display">
        <div class="wrapper-video">
            <div id="escudo-zeus"></div>
            <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" scrolling="no"></iframe>
        </div>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Premium", url: "https://futbol-libre.su/win-sports-premium/" }
        ];

        const listaBotones = document.getElementById('lista-botones');
        const videoFrame = document.getElementById('video-frame');
        const escudo = document.getElementById('escudo-zeus');

        canales.forEach((canal) => {
            const boton = document.createElement('button');
            boton.className = 'btn-zeus';
            boton.innerText = canal.nombre;
            boton.onclick = () => {
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                
                document.getElementById('menu-canales').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                document.getElementById('cine-display').style.display = 'flex'; // Usamos flex para centrar
                document.getElementById('nombre-canal-display').innerText = `ZEUS CORE: ${canal.nombre}`;
                
                videoFrame.src = canal.url;
                escudo.style.display = 'block';
                escudo.style.pointerEvents = 'none';

                const monitor = setInterval(() => {
                    if (document.activeElement === videoFrame) {
                        escudo.style.pointerEvents = 'auto';
                        clearInterval(monitor);
                    }
                }, 100);
            };
            listaBotones.appendChild(boton);
        });
    </script>
</body>
</html>
