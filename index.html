<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEUS CORE TV</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* FRANJA SUPERIOR */
        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 40px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10005;
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: clamp(10px, 2vw, 14px); /* Se ajusta al tamaño de pantalla */
            text-shadow: 0 0 8px #00f2ff;
        }

        /* MENU DE SELECCIÓN */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
            gap: 20px;
        }

        .btn-zeus {
            padding: 15px 30px;
            width: 80%;
            max-width: 350px;
            font-size: 18px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        /* CONTENEDOR DE VIDEO DINÁMICO */
        .contenedor-cine {
            position: absolute;
            top: 40px; /* Debajo de la franja */
            left: 0;
            width: 100vw;
            height: calc(100vh - 40px);
            display: none;
            background: #000;
        }

        /* EL TRUCO PARA SMART TV: Ajuste por proporción */
        iframe {
            position: absolute;
            width: 350%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
        }

        /* Si quieres el efecto de zoom solo en PC para quitar bordes negros del stream */
        @media (min-width: 1200px) {
            iframe {
                width: 100%;
                height: 90%;
                top: -30%;
                transform: scale(1.1);
            }
        }

        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
        }
        
        .panel-controles {
            position: fixed;
            top: 50px; 
            right: 20px;
            z-index: 10006;
            display: none;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-display">ZEUS CORE TV</div>
    </div>

    <div class="overlay-inicio" id="menu">
        <h2 style="color:#00f2ff; letter-spacing:4px; text-align: center;">ZEUS CORE SYSTEM</h2>
        <div id="lista-canales" style="display:flex; flex-direction:column; gap:15px; width: 100%; align-items: center;"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button style="background:#000; color:#00f2ff; border:1px solid #00f2ff; padding:10px; cursor:pointer;" onclick="window.location.reload()">🔄 VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine">
        <div id="escudo-zeus"></div>
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen" scrolling="no"></iframe>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Premium", url: "https://futbol-libre.su/win-sports-premium/" }
        ];

        const lista = document.getElementById('lista-canales');
        const frame = document.getElementById('video-frame');
        const escudo = document.getElementById('escudo-zeus');

        canales.forEach(c => {
            const b = document.createElement('button');
            b.className = 'btn-zeus';
            b.innerText = c.nombre;
            b.onclick = () => {
                // Pantalla completa para TV y Navegadores
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

                document.getElementById('menu').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                document.getElementById('cine').style.display = 'block';
                document.getElementById('nombre-display').innerText = `CANAL: ${c.nombre}`;
                
                frame.src = c.url;
                
                // Activar escudo protector ZEUS
                escudo.style.display = 'block';
                escudo.style.pointerEvents = 'none';

                const monitor = setInterval(() => {
                    if (document.activeElement === frame) {
                        escudo.style.pointerEvents = 'auto';
                        clearInterval(monitor);
                    }
                }, 100);
            };
            lista.appendChild(b);
        });
    </script>
</body>
</html>
