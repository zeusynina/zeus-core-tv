<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS CORE TV PRO</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    overflow: hidden;
}

/* LAYOUT */
.app {
    display: flex;
    height: 100dvh;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: #050505;
    border-right: 2px solid #00f2ff;
    padding: 15px;
    box-sizing: border-box;
    overflow-y: auto;
    transition: 0.3s;
}

.sidebar h2 {
    color: #00f2ff;
    font-size: 13px;
    letter-spacing: 2px;
}

.canal {
    padding: 8px;
    cursor: pointer;
    border-radius: 5px;
    margin-bottom: 5px;
}

.canal:hover {
    background: #00f2ff;
    color: #000;
}

/* MAIN */
.main {
    flex: 1;
    position: relative;
    background: black;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* BLOQUEADOR ANTI POPUPS */
#bloqueador {
    position: absolute;
    top: 40px;
    left: 0;
    width: 100%;
    height: calc(100% - 40px);
    z-index: 9;
    background: transparent;
}

/* FRANJA QUE TAPA HEADER DEL STREAM */
#franja-oculta {
    position: absolute;
    top: 5px;   /* 🔼 sube más la franja */
    width: 150%;
    height: 100px; /* 🔼 más alta para tapar TODO */
    background: black;
    z-index: 8;
    pointer-events: none;
}

/* TOPBAR */
.topbar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 40px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    z-index: 10;
}

.titulo {
    color: #00f2ff;
    font-size: 12px;
}

/* CONTROLES */
.controles {
    display: flex;
    gap: 5px;
}

select, button {
    background: black;
    border: 1px solid #00f2ff;
    color: #00f2ff;
    cursor: pointer;
}

/* MOBILE */
.menu-btn {
    display: none;
}

@media(max-width:768px){
    .sidebar {
        position: absolute;
        left: -250px;
        top: 0;
        height: 100%;
        z-index: 20;
    }
    .sidebar.active {
        left: 0;
    }
    .menu-btn {
        display: block;
    }
}
</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->

<div class="main">

<div class="topbar">
    <div class="controles">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <div class="titulo" id="titulo">ZEUS TV</div>
    </div>

```
<div class="controles">
    <select id="calidad">
        <option value="auto">AUTO</option>
        <option value="sd">SD</option>
        <option value="hd">HD</option>
    </select>
    <button onclick="permitirClicks()">INTERACTUAR</button>
    <button onclick="volver()">VOLVER</button>
</div>
```

</div>

<!-- BLOQUEADOR -->

<div id="bloqueador"></div>

<!-- FRANJA NEGRA -->

<div id="franja-oculta"></div>

<!-- PLAYER -->

<iframe id="player"
sandbox="allow-scripts allow-same-origin allow-presentation"
allow="autoplay; fullscreen">
</iframe>

</div>
</div>

<script>

/* BLOQUEO EXTRA */
window.open = function(){ return null; };

/* DATA */
const data = {
"Deportes":[
{
nombre:"Win Sports+",
urls:{
auto:"https://futbol-libre.su/win-sports-premium/",
sd:"https://futbol-libre.su/win-sports-premium/",
hd:"https://futbol-libre.su/win-sports-premium/"
}
},
{
nombre:"ESPN",
urls:{
auto:"https://futbol-libre.su/espn-1/",
sd:"https://futbol-libre.su/espn-1/",
hd:"https://futbol-libre.su/espn-1/"
}
}
],
"Internacional":[
{
nombre:"Fox Sports",
urls:{
auto:"https://futbol-libre.su/fox-sports/",
sd:"https://futbol-libre.su/fox-sports/",
hd:"https://futbol-libre.su/fox-sports/"
}
}
]
};

const sidebar = document.getElementById("sidebar");
const player = document.getElementById("player");
const titulo = document.getElementById("titulo");
const calidad = document.getElementById("calidad");
const bloqueador = document.getElementById("bloqueador");

let canalActual=null;

/* CREAR MENU */
for(let cat in data){
let div=document.createElement("div");
let h=document.createElement("h2");
h.innerText=cat;
div.appendChild(h);

data[cat].forEach(c=>{
let btn=document.createElement("div");
btn.className="canal";
btn.innerText=c.nombre;

btn.onclick=()=>{
canalActual=c;
cargar();
cerrarMenu();
};

div.appendChild(btn);
});

sidebar.appendChild(div);
}

/* CARGAR */
function cargar(){
if(!canalActual)return;

let url=canalActual.urls[calidad.value];
player.src=url;

titulo.innerText=canalActual.nombre+" ("+calidad.value+")";

/* activar bloqueo siempre */
bloqueador.style.pointerEvents="auto";
}

/* CAMBIO CALIDAD */
calidad.addEventListener("change",cargar);

/* PERMITIR INTERACCION */
function permitirClicks(){
bloqueador.style.pointerEvents="none";
}

/* VOLVER */
function volver(){
player.src="";
titulo.innerText="ZEUS TV";
canalActual=null;
}

/* MENU */
function toggleMenu(){
sidebar.classList.toggle("active");
}
function cerrarMenu(){
sidebar.classList.remove("active");
}

</script>

</body>
</html>
