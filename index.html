<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEUS CORE TV</title>
    <style>
        /* RESET TOTAL PARA TV */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            background-color: #000; 
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* FRANJA SUPERIOR FIJA */
        .franja-marca {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 40px; 
            background: #050505;
            border-bottom: 2px solid #00f2ff;
            display: none; /* Se activa al iniciar */
            align-items: center;
            justify-content: center;
            z-index: 10005;
        }

        .texto-marca {
            color: #00f2ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 14px;
            text-shadow: 0 0 8px #00f2ff;
        }

        /* MENÚ DE SELECCIÓN */
        .overlay-inicio {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10010;
        }

        .btn-zeus {
            padding: 15px 40px;
            width: 320px;
            font-size: 18px;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* CONTENEDOR DE VIDEO: OCUPA TODO EL RESTO DE LA PANTALLA */
        .contenedor-cine {
            position: absolute;
            top: 40px; /* Justo debajo de la franja */
            left: 0;
            width: 100%;
            height: calc(100% - 40px);
            background: #000;
            display: none;
        }

        /* EL REPRODUCTOR SE AJUSTA AL 100% DEL CONTENEDOR */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ESCUDO ZEUS */
        #escudo-zeus {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            background: transparent;
            display: none;
        }

        /* PANEL VOLVER */
        .panel-controles {
            position: fixed;
            bottom: 20px; /* En TV es más fácil verlo abajo */
            right: 20px;
            z-index: 10006;
            display: none;
        }

        .btn-volver {
            background: rgba(10, 10, 10, 0.95);
            color: #ff0000; /* Rojo para que resalte en la TV */
            border: 1px solid #ff0000;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="franja-marca" id="barra-titulo">
        <div class="texto-marca" id="nombre-display">ZEUS CORE TV</div>
    </div>

    <div class="overlay-inicio" id="menu-canales">
        <h1 style="color: #00f2ff; letter-spacing: 5px;">ZEUS CORE</h1>
        <div id="lista-botones"></div>
    </div>

    <div class="panel-controles" id="controles">
        <button class="btn-volver" onclick="window.location.reload()">SALIR / VOLVER</button>
    </div>

    <div class="contenedor-cine" id="cine-display">
        <div id="escudo-zeus"></div>
        <iframe id="video-frame" src="" allow="autoplay; encrypted-media; fullscreen"></iframe>
    </div>

    <script>
        const canales = [
            { nombre: "Win Sports Premium", url: "https://futbol-libre.su/win-sports-premium/" }
        ];

        const listaBotones = document.getElementById('lista-botones');
        const videoFrame = document.getElementById('video-frame');
        const escudo = document.getElementById('escudo-zeus');

        canales.forEach((canal) => {
            const boton = document.createElement('button');
            boton.className = 'btn-zeus';
            boton.innerText = canal.nombre;
            boton.onclick = () => {
                // Pantalla completa forzada
                const doc = document.documentElement;
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
                
                document.getElementById('menu-canales').style.display = 'none';
                document.getElementById('barra-titulo').style.display = 'flex';
                document.getElementById('controles').style.display = 'block';
                document.getElementById('cine-display').style.display = 'block';
                document.getElementById('nombre-display').innerText = `ZEUS CORE: ${canal.nombre}`;
                
                videoFrame.src = canal.url;
                
                // Activar escudo protector
                escudo.style.display = 'block';
                escudo.style.pointerEvents = 'none';

                // Monitor de activación
                const monitor = setInterval(() => {
                    if (document.activeElement === videoFrame) {
                        escudo.style.pointerEvents = 'auto';
                        clearInterval(monitor);
                    }
                }, 100);
            };
            listaBotones.appendChild(boton);
        });
    </script>
</body>
</html>
